<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - VideoPlayer MVP</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Login Section -->
    <div id="login-section" class="landing-body">
        <div class="landing-container">
            <h2>Login Super Admin</h2>
            <form id="login-form" style="margin-top: 2rem;">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Usuário (superadmin)" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Senha (super123)" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Entrar</button>
                <div id="login-error" style="color: red; margin-top: 1rem; display: none;"></div>
            </form>
            <button id="show-register-btn" class="btn btn-secondary" style="width: 100%; margin-top: 10px;">Criar Conta</button>
            <br>
            <a href="/">Voltar para o Início</a>
        </div>
    </div>

    <!-- Register Section -->
    <div id="register-section" class="landing-body hidden">
        <div class="landing-container">
            <h2>Criar Conta de Super Admin</h2>
            <form id="register-form" style="margin-top: 2rem;">
                <div class="form-group">
                    <input type="text" id="reg-username" class="form-control" placeholder="Usuário" required>
                </div>
                <div class="form-group">
                    <input type="password" id="reg-password" class="form-control" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Cadastrar</button>
                <div id="register-error" style="color: red; margin-top: 1rem; display: none;"></div>
                <div id="register-success" style="color: green; margin-top: 1rem; display: none;"></div>
            </form>
            <button id="show-login-btn" class="btn btn-secondary" style="width: 100%; margin-top: 10px;">Voltar ao Login</button>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden">
        <header class="admin-header">
            <h2>Painel Geral - Instituições</h2>
            <div>
                <a href="/" class="btn btn-secondary btn-small">Ver Site</a>
                <button id="logout-btn" class="btn btn-danger btn-small">Sair</button>
            </div>
        </header>

        <main class="admin-container">
            <!-- Inst List -->
            <div id="inst-list-view" class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Instituições Cadastradas</h2>
                    <button id="new-inst-btn" class="btn">Nova Instituição</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Vídeos (Uso/Limite)</th>
                            <th>Perguntas (Uso/Limite)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="inst-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Inst Form -->
            <div id="inst-form-view" class="card hidden">
                <h2 id="inst-form-title">Cadastrar Instituição</h2>
                <form id="inst-form">
                    <input type="hidden" id="inst-id">
                    <div class="form-group">
                        <label>Nome da Instituição</label>
                        <input type="text" id="inst-nome" class="form-control" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Limite de Vídeos</label>
                            <input type="number" id="inst-lvideo" class="form-control" value="10" required>
                        </div>
                        <div class="form-group">
                            <label>Limite de Perguntas</label>
                            <input type="number" id="inst-lperg" class="form-control" value="50" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>URL da Logomarca (opicional)</label>
                        <input type="url" id="inst-logo" class="form-control" placeholder="https://...">
                    </div>

                    <!-- Campos de Acesso (Apenas para Criação) -->
                    <div id="inst-credentials-section" style="border: 1px solid #ddd; padding: 15px; border-radius: 4px; margin-bottom: 15px;">
                        <h4 style="margin-top:0; margin-bottom:10px;">Acesso do Administrador</h4>
                        <div class="form-group">
                            <label>Email / Usuário de Acesso</label>
                            <input type="text" id="inst-admin-email" class="form-control" placeholder="admin@instituicao.com">
                        </div>
                        <div class="form-group">
                            <label>Senha Provisória</label>
                            <input type="password" id="inst-admin-pass" class="form-control" placeholder="Senha Forte">
                        </div>
                    </div>

                    <!-- Campos de Status (Apenas para Edição) -->
                    <div id="inst-status-section" class="form-group hidden">
                        <label>Status da Instituição</label>
                        <select id="inst-status" class="form-control">
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                    
                    <div id="inst-created-info" class="feedback-msg success hidden" style="margin-bottom: 1rem;">
                        Instituição atualizada/criada com sucesso!
                    </div>

                    <div>
                        <button type="submit" class="btn">Salvar</button>
                        <button type="button" id="cancel-inst-btn" class="btn btn-secondary">Voltar</button>
                    </div>
                </form>
            </div>

        </main>
    </div>

    <script src="/superadmin/app.js"></script>
</body>
</html>
