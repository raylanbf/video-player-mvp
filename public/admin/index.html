<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VideoPlayer MVP</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- Login Section -->
    <div id="login-section" class="landing-body">
        <div class="landing-container">
            <h2>Login Administrativo</h2>
            <form id="login-form" style="margin-top: 2rem;">
                <div class="form-group">
                    <input type="text" id="username" class="form-control" placeholder="Usuário (admin)" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" class="form-control" placeholder="Senha (admin123)" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Entrar</button>
                <div id="login-error" style="color: red; margin-top: 1rem; display: none;"></div>
            </form>
            <br>
            <a href="/">Voltar para o Início</a>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden">
        <header class="admin-header">
            <h2>Painel Administrativo</h2>
            <div>
                <a href="/" class="btn btn-secondary btn-small">Ver Site</a>
                <button id="logout-btn" class="btn btn-danger btn-small">Sair</button>
            </div>
        </header>

        <main class="admin-container">
            <!-- Videos List -->
            <div id="videos-list-view" class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Meus Vídeos</h2>
                    <button id="new-video-btn" class="btn">Novo Vídeo</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Duração (min)</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="videos-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Video Form -->
            <div id="video-form-view" class="card hidden">
                <h2 id="video-form-title">Cadastrar/Editar Vídeo</h2>
                <form id="video-form">
                    <input type="hidden" id="video-id">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" id="video-title" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="video-desc" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>URL do Vídeo (MP4, etc)</label>
                            <input type="url" id="video-url" class="form-control" placeholder="https://..." required>
                        </div>
                        <div class="form-group">
                            <label>Duração (minutos)</label>
                            <input type="number" id="video-duration" class="form-control" min="1" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="video-status" class="form-control">
                            <option value="ativo">Ativo</option>
                            <option value="inativo">Inativo</option>
                        </select>
                    </div>
                    <div>
                        <button type="submit" class="btn">Salvar Vídeo</button>
                        <button type="button" id="cancel-video-btn" class="btn btn-secondary">Cancelar</button>
                    </div>
                </form>
            </div>

            <!-- Questions Management (Inside a specific video) -->
            <div id="questions-view" class="card hidden">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                    <h2>Perguntas do Vídeo: <span id="q-video-title"></span></h2>
                    <div>
                        <button id="new-question-btn" class="btn">Nova Pergunta</button>
                        <button id="back-to-videos-btn" class="btn btn-secondary">Voltar aos Vídeos</button>
                    </div>
                </div>
                <!-- Question Form -->
                <div id="question-form-container" class="hidden" style="background: #F9FAFB; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid #E5E7EB;">
                    <form id="question-form">
                        <input type="hidden" id="q-id">
                        <div class="form-row">
                            <div class="form-group" style="flex: 0.3;">
                                <label>Minuto Disparo</label>
                                <input type="number" step="0.1" id="q-minuto" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>Enunciado</label>
                                <input type="text" id="q-enunciado" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>A.</label><input type="text" id="q-alta" class="form-control" required></div>
                            <div class="form-group"><label>B.</label><input type="text" id="q-altb" class="form-control" required></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>C.</label><input type="text" id="q-altc" class="form-control" required></div>
                            <div class="form-group"><label>D.</label><input type="text" id="q-altd" class="form-control" required></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group" style="flex: 0.5;">
                                <label>Alternativa Correta</label>
                                <select id="q-correta" class="form-control">
                                    <option value="a">A</option>
                                    <option value="b">B</option>
                                    <option value="c">C</option>
                                    <option value="d">D</option>
                                </select>
                            </div>
                            <div class="form-group"><label>Feedback Correto</label><input type="text" id="q-feedback-c" class="form-control" required></div>
                            <div class="form-group"><label>Feedback Errado</label><input type="text" id="q-feedback-e" class="form-control" required></div>
                        </div>
                        <div style="margin-top: 1rem;">
                            <button type="submit" class="btn btn-small">Salvar Pergunta</button>
                            <button type="button" id="cancel-question-btn" class="btn btn-secondary btn-small">Cancelar</button>
                        </div>
                    </form>
                </div>

                <!-- Questions List -->
                <table>
                    <thead>
                        <tr>
                            <th>Minuto</th>
                            <th>Enunciado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="questions-tbody">
                        <!-- Loaded by JS -->
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script src="/admin/app.js"></script>
</body>
</html>
